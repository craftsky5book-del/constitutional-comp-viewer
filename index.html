<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本国憲法 ／ 改正草案 対照ビューア</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           style-src 'self' https://fonts.googleapis.com;
           font-src https://fonts.gstatic.com;
           script-src 'self';
           img-src 'self';">
</head>
<body>

<div id="overlay"></div>

<nav id="sb">
  <div class="sbh">
    <div class="sb-logo">
      <div class="sb-icon">
        <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
      </div>
      <div>
        <div class="sb-title">憲法対照ビューア</div>
        <div class="sb-sub">1947 vs 2012 LDP Draft</div>
      </div>
    </div>
    <div class="sb-stats">
      <div class="stat c"><div class="stat-n">103</div><div class="stat-l">変更</div></div>
      <div class="stat a"><div class="stat-n">8</div><div class="stat-l">新設</div></div>
      <div class="stat d"><div class="stat-n">1</div><div class="stat-l">削除</div></div>
    </div>
  </div>
  <div class="sbq">
    <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4"/><path d="m10 10 3 3"/></svg>
    <input id="q" type="text" placeholder="条文を検索…">
  </div>
  <div class="sbn" id="sbn"></div>
</nav>

<div id="hd">
  <button id="hambtn" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>
  <div class="hd-text">
    <div class="hdttl">日本国憲法 ／ 自民党改正草案 対照ビューア</div>
    <div class="hdsub">現行憲法（昭和21年）vs 自由民主党改正草案（平成24年4月27日）</div>
  </div>
  <div class="hd-controls">
    <div class="vtog" id="vtog">
      <button class="vb on" data-v="split">対照</button>
      <button class="vb" data-v="diff">Diff</button>
    </div>
    <button class="thbtn" id="thbtn" title="テーマ切り替え">☀️</button>
  </div>
</div>

<div id="fb">
  <span class="fbl">Filter</span>
  <button class="fbb on all"  data-f="all">すべて</button>
  <button class="fbb changed" data-f="changed">変更</button>
  <button class="fbb added"   data-f="added">新設</button>
  <button class="fbb deleted" data-f="deleted">削除</button>
</div>

<div id="main"></div>
<button id="stop">↑</button>

<script src="script.js"></script>
</body>
</html>
