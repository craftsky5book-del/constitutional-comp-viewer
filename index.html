<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本国憲法 ／ 改正草案 対照ビューア</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root { --sidebar-w:252px; --header-h:64px; --r:8px; --t:.2s ease; }

[data-theme="dark"] {
  --bg:#0d0d12; --sf:#14141c; --sf2:#1b1b27; --sf3:#22222f;
  --bd:#2c2c3e; --bd2:#3a3a50;
  --tx:#e4e2f4; --tx2:#8884a8; --tx3:#46445c;
  --ac:#8b7fff; --acg:rgba(139,127,255,.15);
  --del-bg:#1e0c16; --del-bd:#5c1530; --del-tx:#ff7090; --del-hl:rgba(255,60,90,.32); --del-mk:#ff4060;
  --add-bg:#091a10; --add-bd:#164828; --add-tx:#50e090; --add-hl:rgba(50,200,100,.32); --add-mk:#30d870;
  --bc-c-bg:rgba(255,165,0,.13); --bc-c:#ffa500;
  --bc-a-bg:rgba(50,200,100,.13); --bc-a:#30d870;
  --bc-d-bg:rgba(255,60,90,.13);  --bc-d:#ff4060;
  --scr:#2c2c3e; --sct:#46445c;
}
[data-theme="light"] {
  --bg:#f4f3ef; --sf:#ffffff; --sf2:#eeedf8; --sf3:#e5e4f2;
  --bd:#d5d3ec; --bd2:#c0bedc;
  --tx:#1a1830; --tx2:#6a6888; --tx3:#b0aec8;
  --ac:#5a4cd8; --acg:rgba(90,76,216,.1);
  --del-bg:#fff0f3; --del-bd:#f4b8c4; --del-tx:#b8182e; --del-hl:rgba(200,30,60,.18); --del-mk:#c0182e;
  --add-bg:#f0faf4; --add-bd:#aadfc0; --add-tx:#0c7332; --add-hl:rgba(12,115,50,.18); --add-mk:#0c7332;
  --bc-c-bg:rgba(160,90,0,.12); --bc-c:#a05000;
  --bc-a-bg:rgba(10,110,45,.12); --bc-a:#0a6e2d;
  --bc-d-bg:rgba(185,20,45,.12); --bc-d:#b9142d;
  --scr:#e4e2f4; --sct:#c4c2dc;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background var(--t),color var(--t)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--scr)}::-webkit-scrollbar-thumb{background:var(--sct);border-radius:3px}

/* ── SIDEBAR ── */
#sb{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:200;transition:background var(--t),border-color var(--t)}
.sbh{padding:18px 16px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sbt{font-family:'Noto Serif JP',serif;font-size:12px;font-weight:500;letter-spacing:.1em;color:var(--tx2);line-height:1.7}
.sbst{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.chip{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid}
.chip.c{background:var(--bc-c-bg);color:var(--bc-c);border-color:var(--bc-c)}
.chip.a{background:var(--bc-a-bg);color:var(--bc-a);border-color:var(--bc-a)}
.chip.d{background:var(--bc-d-bg);color:var(--bc-d);border-color:var(--bc-d)}
.sbq{padding:10px 12px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sbq input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font:12px 'Noto Sans JP',sans-serif;padding:6px 10px;outline:none;transition:border-color var(--t)}
.sbq input:focus{border-color:var(--ac)}
.sbq input::placeholder{color:var(--tx3)}
.sbn{flex:1;overflow-y:auto;padding:6px 0 24px}
.ncht{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;color:var(--tx3);padding:8px 14px 4px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:color var(--t)}
.ncht:hover{color:var(--tx2)}
.arr{font-size:9px;transition:transform .2s}
.ncht.cls .arr{transform:rotate(-90deg)}
.nvl.cls{display:none}
.nvi{display:flex;align-items:center;gap:8px;padding:5px 14px;font-size:11.5px;color:var(--tx2);cursor:pointer;border-left:2px solid transparent;transition:all var(--t);user-select:none}
.nvi:hover{background:var(--sf2);color:var(--tx)}
.nvi.active{border-left-color:var(--ac);color:var(--tx);background:var(--acg)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot.changed{background:var(--bc-c)}.dot.added{background:var(--bc-a)}.dot.deleted{background:var(--bc-d)}.dot.same{background:var(--tx3)}

/* ── HEADER ── */
#hd{position:sticky;top:0;z-index:100;margin-left:var(--sidebar-w);height:var(--header-h);background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 28px;gap:14px;transition:background var(--t),border-color var(--t)}
.hdttl{font-family:'Noto Serif JP',serif;font-size:15px;font-weight:300;letter-spacing:.1em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdsub{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx2);margin-top:2px;letter-spacing:.05em}
.cg{display:flex;gap:7px;align-items:center;flex-shrink:0}
.ptog{display:flex;gap:3px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:3px}
.pb{padding:4px 13px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.05em;border:none;border-radius:5px;cursor:pointer;background:none;color:var(--tx2);transition:all var(--t)}
.pb.on{background:var(--ac);color:#fff}
.thbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--bd);background:var(--sf2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--t);color:var(--tx2)}
.thbtn:hover{border-color:var(--ac);color:var(--tx)}

/* ── FILTER BAR ── */
#fb{margin-left:var(--sidebar-w);background:var(--sf2);border-bottom:1px solid var(--bd);padding:7px 28px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;transition:background var(--t),border-color var(--t)}
.fbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--tx3);letter-spacing:.06em;margin-right:2px}
.fbb{padding:3px 11px;font-family:'DM Mono',monospace;font-size:10px;border-radius:20px;border:1px solid var(--bd);background:none;color:var(--tx2);cursor:pointer;transition:all var(--t)}
.fbb:hover{border-color:var(--ac);color:var(--tx)}
.fbb.on.all    {background:var(--acg);color:var(--ac);border-color:var(--ac)}
.fbb.on.changed{background:var(--bc-c-bg);color:var(--bc-c);border-color:var(--bc-c)}
.fbb.on.added  {background:var(--bc-a-bg);color:var(--bc-a);border-color:var(--bc-a)}
.fbb.on.deleted{background:var(--bc-d-bg);color:var(--bc-d);border-color:var(--bc-d)}

/* ── MAIN ── */
#main{margin-left:var(--sidebar-w);padding:0 28px 80px;max-width:calc(100% - var(--sidebar-w))}
.chb{margin-top:34px}
.chh{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd);margin-bottom:13px;cursor:pointer;user-select:none;font-family:'Noto Serif JP',serif;font-size:13px;font-weight:500;letter-spacing:.1em;color:var(--tx2);transition:color var(--t)}
.chh:hover{color:var(--tx)}
.chbar{width:3px;height:14px;border-radius:2px;background:var(--ac);flex-shrink:0}
.chtog{margin-left:auto;font-size:10px;color:var(--tx3);font-family:'DM Mono',monospace}
.cha.cls{display:none}

/* ── CARD ── */
.card{margin-bottom:9px;border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;transition:border-color var(--t)}
.card:hover{border-color:var(--bd2)}
.card.status-changed{border-left:3px solid var(--bc-c)}
.card.status-added  {border-left:3px solid var(--bc-a)}
.card.status-deleted{border-left:3px solid var(--bc-d)}
.cardh{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--sf);cursor:pointer;user-select:none;transition:background var(--t)}
.cardh:hover{background:var(--sf2)}
.cardkey{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--ac)}
.cardbadge{font-family:'DM Mono',monospace;font-size:10px;padding:1px 8px;border-radius:20px;border:1px solid}
.status-changed .cardbadge{background:var(--bc-c-bg);color:var(--bc-c);border-color:var(--bc-c)}
.status-added   .cardbadge{background:var(--bc-a-bg);color:var(--bc-a);border-color:var(--bc-a)}
.status-deleted .cardbadge{background:var(--bc-d-bg);color:var(--bc-d);border-color:var(--bc-d)}
.cardarr{margin-left:auto;font-size:11px;color:var(--tx3);transition:transform .2s}
.card.cls .cardarr{transform:rotate(-90deg)}
.card.cls .cardbody{display:none}

/* ── SPLIT ── */
.split{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bd)}
.pane{padding:16px 20px;font-family:'Noto Serif JP',serif;font-size:13px;line-height:2}
.pane.orig {background:var(--del-bg)}
.pane.drft {background:var(--add-bg)}
.plbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;margin-bottom:11px;padding-bottom:6px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.pane.orig .plbl{color:var(--del-mk)} .pane.drft .plbl{color:var(--add-mk)}
.pdot{width:7px;height:7px;border-radius:50%}
.pane.orig .pdot{background:var(--del-mk)} .pane.drft .pdot{background:var(--add-mk)}

/* char-level highlight */
.hd{background:var(--del-hl);color:var(--del-mk);border-radius:2px;padding:0 1px;font-weight:500}
.ha{background:var(--add-hl);color:var(--add-mk);border-radius:2px;padding:0 1px;font-weight:500}

/* only-pane */
.opane{padding:16px 20px;font-family:'Noto Serif JP',serif;font-size:13px;line-height:2}
.status-added   .opane{background:var(--add-bg);color:var(--add-tx)}
.status-deleted .opane{background:var(--del-bg);color:var(--del-tx)}
.olbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.status-added   .olbl{color:var(--add-mk)}
.status-deleted .olbl{color:var(--del-mk)}

/* ── DIFF ── */
.diffwrap{font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.9;background:var(--sf)}
.dl{display:flex;padding:3px 20px;gap:10px}
.dl.del{background:var(--del-bg);color:var(--del-tx)}
.dl.add{background:var(--add-bg);color:var(--add-tx)}
.dl.ctx{color:var(--tx2)}
.dm{font-family:'DM Mono',monospace;font-size:11px;width:12px;flex-shrink:0;opacity:.7;margin-top:1px}
.dl.del .dm{color:var(--del-mk)} .dl.add .dm{color:var(--add-mk)}
.dt{flex:1;word-break:break-all}
.dl.del .hd{background:rgba(255,60,90,.42)} .dl.add .ha{background:rgba(50,200,100,.42)}

/* ── SCROLL TOP ── */
#stop{position:fixed;bottom:22px;right:22px;width:38px;height:38px;border-radius:50%;background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:300;opacity:0;pointer-events:none;transition:all var(--t)}
#stop.on{opacity:1;pointer-events:auto}
#stop:hover{background:var(--ac);color:#fff;border-color:var(--ac)}

@media(max-width:860px){
  #sb{transform:translateX(-100%)}
  #hd,#fb,#main{margin-left:0;max-width:100%}
  .split{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav id="sb">
  <div class="sbh">
    <div class="sbt">日本国憲法<br>改正草案 対照表</div>
    <div class="sbst">
      <span class="chip c">変更 103</span>
      <span class="chip a">新設 8</span>
      <span class="chip d">削除 1</span>
    </div>
  </div>
  <div class="sbq"><input id="q" type="text" placeholder="条文を検索…"></div>
  <div class="sbn" id="sbn"></div>
</nav>

<div id="hd">
  <div>
    <div class="hdttl">日本国憲法 ／ 自民党改正草案 対照ビューア</div>
    <div class="hdsub">現行憲法（昭和21年）vs 自由民主党改正草案（平成24年4月27日決定）</div>
  </div>
  <div class="cg">
    <div class="ptog" id="vtog">
      <button class="pb on" data-v="split">左右対照</button>
      <button class="pb" data-v="diff">Diff</button>
    </div>
    <button class="thbtn" id="thbtn" title="テーマ切り替え">☀️</button>
  </div>
</div>

<div id="fb">
  <span class="fbl">表示：</span>
  <button class="fbb on all"     data-f="all">すべて</button>
  <button class="fbb changed"    data-f="changed">変更</button>
  <button class="fbb added"      data-f="added">新設</button>
  <button class="fbb deleted"    data-f="deleted">削除</button>
</div>

<div id="main"></div>
<button id="stop" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
/* ═══════ DATA ═══════ */
const CHAPTERS=[
{title:"前文",articles:[
 {key:"前文",status:"changed",
  orig:`日本国民は、正当に選挙された国会における代表者を通じて行動し、われらとわれらの子孫のために、諸国民との協和による成果と、わが国全土にわたつて自由のもたらす恵沢を確保し、政府の行為によつて再び戦争の惨禍が起ることのないやうにすることを決意し、ここに主権が国民に存することを宣言し、この憲法を確定する。そもそも国政は、国民の厳粛な信託によるものであつて、その権威は国民に由来し、その権力は国民の代表者がこれを行使し、その福利は国民がこれを享受する。これは人類普遍の原理であり、この憲法は、かかる原理に基くものである。われらは、これに反する一切の憲法、法令及び詔勅を排除する。

日本国民は、恒久の平和を念願し、人間相互の関係を支配する崇高な理想を深く自覚するのであつて、平和を愛する諸国民の公正と信義に信頼して、われらの安全と生存を保持しようと決意した。われらは、平和を維持し、専制と隷従、圧迫と偏狭を地上から永遠に除去しようと努めてゐる国際社会において、名誉ある地位を占めたいと思ふ。われらは、全世界の国民が、ひとしく恐怖と欠乏から免かれ、平和のうちに生存する権利を有することを確認する。

われらは、いづれの国家も、自国のことのみに専念して他国を無視してはならないのであつて、政治道徳の法則は、普遍的なものであり、この法則に従ふことは、自国の主権を維持し、他国と対等関係に立たうとする各国の責務であると信ずる。

日本国民は、国家の名誉にかけ、全力をあげてこの崇高な理想と目的を達成することを誓ふ。`,
  draft:`日本国は、長い歴史と固有の文化を持ち、国民統合の象徴である天皇を戴く国家であって、国民主権の下、立法、行政及び司法の三権分立に基づいて統治される。

我が国は、先の大戦による荒廃や幾多の大災害を乗り越えて発展し、今や国際社会において重要な地位を占めており、平和主義の下、諸外国との友好関係を増進し、世界の平和と繁栄に貢献する。

日本国民は、国と郷土を誇りと気概を持って自ら守り、基本的人権を尊重するとともに、和を尊び、家族や社会全体が互いに助け合って国家を形成する。

我々は、自由と規律を重んじ、美しい国土と自然環境を守りつつ、教育や科学技術を振興し、活力ある経済活動を通じて国を成長させる。

日本国民は、良き伝統と我々の国家を末永く子孫に継承するため、ここに、この憲法を制定する。`}
]},
{title:"第一章　天皇",articles:[
 {key:"第一条",status:"changed",orig:"第一条　天皇は、日本国の象徴であり日本国民統合の象徴であつて、この地位は、主権の存する日本国民の総意に基く。",draft:"（天皇）\n第一条　天皇は、日本国の元首であり、日本国及び日本国民統合の象徴であって、その地位は、主権の存する日本国民の総意に基づく。"},
 {key:"第二条",status:"changed",orig:"第二条　皇位は、世襲のものであつて、国会の議決した皇室典範の定めるところにより、これを継承する。",draft:"（皇位の継承）\n第二条　皇位は、世襲のものであって、国会の議決した皇室典範の定めるところにより、これを継承する。"},
 {key:"第三条",status:"changed",orig:"第三条　天皇の国事に関するすべての行為には、内閣の助言と承認を必要とし、内閣が、その責任を負ふ。",draft:"（国旗及び国歌）\n第三条　国旗は日章旗とし、国歌は君が代とする。\n２　日本国民は、国旗及び国歌を尊重しなければならない。"},
 {key:"第四条",status:"changed",orig:"第四条　天皇は、この憲法の定める国事に関する行為のみを行ひ、国政に関する権能を有しない。\n２　天皇は、法律の定めるところにより、その国事に関する行為を委任することができる。",draft:"（元号）\n第四条　元号は、法律の定めるところにより、皇位の継承があったときに制定する。"},
 {key:"第五条",status:"changed",orig:"第五条　皇室典範の定めるところにより摂政を置くときは、摂政は、天皇の名でその国事に関する行為を行ふ。この場合には、前条第一項の規定を準用する。",draft:"（天皇の権能）\n第五条　天皇は、この憲法に定める国事に関する行為を行い、国政に関する権能を有しない。"},
 {key:"第六条",status:"changed",orig:"第六条　天皇は、国会の指名に基いて、内閣総理大臣を任命する。\n２　天皇は、内閣の指名に基いて、最高裁判所の長たる裁判官を任命する。",draft:"（天皇の国事行為等）\n第六条　天皇は、国民のために、国会の指名に基づいて内閣総理大臣を任命し、内閣の指名に基づいて最高裁判所の長である裁判官を任命する。\n２　天皇は、国民のために、次に掲げる国事に関する行為を行う。\n一　憲法改正、法律、政令及び条約を公布すること。\n二　国会を召集すること。\n三　衆議院を解散すること。\n四　衆議院議員の総選挙及び参議院議員の通常選挙の施行を公示すること。\n五　国務大臣及び法律の定めるその他の国の公務員の任免を認証すること。\n六　大赦、特赦、減刑、刑の執行の免除及び復権を認証すること。\n七　栄典を授与すること。\n八　全権委任状並びに大使及び公使の信任状並びに批准書及び法律の定めるその他の外交文書を認証すること。\n九　外国の大使及び公使を接受すること。\n十　儀式を行うこと。\n３　天皇は、法律の定めるところにより、前二項の行為を委任することができる。\n４　天皇の国事に関する全ての行為には、内閣の進言を必要とし、内閣がその責任を負う。ただし、衆議院の解散については、内閣総理大臣の進言による。\n５　第一項及び第二項に掲げるもののほか、天皇は、国又は地方自治体その他の公共団体が主催する式典への出席その他の公的な行為を行う。"},
 {key:"第七条",status:"changed",orig:"第七条　天皇は、内閣の助言と承認により、国民のために、左の国事に関する行為を行ふ。\n一　憲法改正、法律、政令及び条約を公布すること。\n二　国会を召集すること。\n三　衆議院を解散すること。\n四　国会議員の総選挙の施行を公示すること。\n五　国務大臣及び法律の定めるその他の官吏の任免並びに全権委任状及び大使及び公使の信任状を認証すること。\n六　大赦、特赦、減刑、刑の執行の免除及び復権を認証すること。\n七　栄典を授与すること。\n八　批准書及び法律の定めるその他の外交文書を認証すること。\n九　外国の大使及び公使を接受すること。\n十　儀式を行ふこと。",draft:"（摂政）\n第七条　皇室典範の定めるところにより摂政を置くときは、摂政は、天皇の名で、その国事に関する行為を行う。\n２　第五条及び前条第四項の規定は、摂政について準用する。"},
 {key:"第八条",status:"changed",orig:"第八条　皇室に財産を譲り渡し、又は皇室が、財産を譲り受け、若しくは賜与することは、国会の議決に基かなければならない。",draft:"（皇室への財産の譲渡等の制限）\n第八条　皇室に財産を譲り渡し、又は皇室が財産を譲り受け、若しくは賜与するには、法律で定める場合を除き、国会の承認を経なければならない。"}
]},
{title:"第二章　安全保障（現行：戦争の放棄）",articles:[
 {key:"第九条",status:"changed",orig:"第九条　日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国権の発動たる戦争と、武力による威嚇又は武力の行使は、国際紛争を解決する手段としては、永久にこれを放棄する。\n２　前項の目的を達するため、陸海空軍その他の戦力は、これを保持しない。国の交戦権は、これを認めない。",draft:"（平和主義）\n第九条　日本国民は、正義と秩序を基調とする国際平和を誠実に希求し、国権の発動としての戦争を放棄し、武力による威嚇及び武力の行使は、国際紛争を解決する手段としては用いない。\n２　前項の規定は、自衛権の発動を妨げるものではない。"},
 {key:"第九条の二（新設）",status:"added",orig:"",draft:"（国防軍）\n第九条の二　我が国の平和と独立並びに国及び国民の安全を確保するため、内閣総理大臣を最高指揮官とする国防軍を保持する。\n２　国防軍は、前項の規定による任務を遂行する際は、法律の定めるところにより、国会の承認その他の統制に服する。\n３　国防軍は、第一項に規定する任務を遂行するための活動のほか、法律の定めるところにより、国際社会の平和と安全を確保するために国際的に協調して行われる活動及び公の秩序を維持し、又は国民の生命若しくは自由を守るための活動を行うことができる。\n４　前二項に定めるもののほか、国防軍の組織、統制及び機密の保持に関する事項は、法律で定める。\n５　国防軍に属する軍人その他の公務員がその職務の実施に伴う罪又は国防軍の機密に関する罪を犯した場合の裁判を行うため、法律の定めるところにより、国防軍に審判所を置く。この場合においては、被告人が裁判所へ上訴する権利は、保障されなければならない。"},
 {key:"第九条の三（新設）",status:"added",orig:"",draft:"（領土等の保全等）\n第九条の三　国は、主権と独立を守るため、国民と協力して、領土、領海及び領空を保全し、その資源を確保しなければならない。"}
]},
{title:"第三章　国民の権利及び義務",articles:[
 {key:"第十条",status:"changed",orig:"第十条　日本国民たる要件は、法律でこれを定める。",draft:"（日本国民）\n第十条　日本国民の要件は、法律で定める。"},
 {key:"第十一条",status:"changed",orig:"第十一条　国民は、すべての基本的人権の享有を妨げられない。この憲法が国民に保障する基本的人権は、侵すことのできない永久の権利として、現在及び将来の国民に与へられる。",draft:"（基本的人権の享有）\n第十一条　国民は、全ての基本的人権を享有する。この憲法が国民に保障する基本的人権は、侵すことのできない永久の権利である。"},
 {key:"第十二条",status:"changed",orig:"第十二条　この憲法が国民に保障する自由及び権利は、国民の不断の努力によつて、これを保持しなければならない。又、国民は、これを濫用してはならないのであつて、常に公共の福祉のためにこれを利用する責任を負ふ。",draft:"（国民の責務）\n第十二条　この憲法が国民に保障する自由及び権利は、国民の不断の努力により、保持されなければならない。国民は、これを濫用してはならず、自由及び権利には責任及び義務が伴うことを自覚し、常に公益及び公の秩序に反してはならない。"},
 {key:"第十三条",status:"changed",orig:"第十三条　すべて国民は、個人として尊重される。生命、自由及び幸福追求に対する国民の権利については、公共の福祉に反しない限り、立法その他の国政の上で、最大の尊重を必要とする。",draft:"（人としての尊重等）\n第十三条　全て国民は、人として尊重される。生命、自由及び幸福追求に対する国民の権利については、公益及び公の秩序に反しない限り、立法その他の国政の上で、最大限に尊重されなければならない。"},
 {key:"第十四条",status:"changed",orig:"第十四条　すべて国民は、法の下に平等であつて、人種、信条、性別、社会的身分又は門地により、政治的、経済的又は社会的関係において、差別されない。\n２　華族その他の貴族の制度は、これを認めない。\n３　栄誉、勲章その他の栄典の授与は、いかなる特権も伴はない。栄典の授与は、現にこれを有し、又は将来これを受ける者の一代に限り、その効力を有する。",draft:"（法の下の平等）\n第十四条　全て国民は、法の下に平等であって、人種、信条、性別、障害の有無、社会的身分又は門地により、政治的、経済的又は社会的関係において、差別されない。\n２　華族その他の貴族の制度は、認めない。\n３　栄誉、勲章その他の栄典の授与は、現にこれを有し、又は将来これを受ける者の一代に限り、その効力を有する。"},
 {key:"第十八条",status:"changed",orig:"第十八条　何人も、いかなる奴隷的拘束も受けない。又、犯罪に因る処罰の場合を除いては、その意に反する苦役に服させられない。",draft:"（身体の拘束及び苦役からの自由）\n第十八条　何人も、その意に反すると否とにかかわらず、社会的又は経済的関係において身体を拘束されない。\n２　何人も、犯罪による処罰の場合を除いては、その意に反する苦役に服させられない。"},
 {key:"第十九条",status:"changed",orig:"第十九条　思想及び良心の自由は、これを侵してはならない。",draft:"（思想及び良心の自由）\n第十九条　思想及び良心の自由は、保障する。"},
 {key:"第十九条の二（新設）",status:"added",orig:"",draft:"（個人情報の不当取得の禁止等）\n第十九条の二　何人も、個人に関する情報を不当に取得し、保有し、又は利用してはならない。"},
 {key:"第二十条",status:"changed",orig:"第二十条　信教の自由は、何人に対してもこれを保障する。いかなる宗教団体も、国から特権を受け、又は政治上の権力を行使してはならない。\n２　何人も、宗教上の行為、祝典、儀式又は行事に参加することを強制されない。\n３　国及びその機関は、宗教教育その他いかなる宗教的活動もしてはならない。",draft:"（信教の自由）\n第二十条　信教の自由は、保障する。国は、いかなる宗教団体に対しても、特権を与えてはならない。\n２　何人も、宗教上の行為、祝典、儀式又は行事に参加することを強制されない。\n３　国及び地方自治体その他の公共団体は、特定の宗教のための教育その他の宗教的活動をしてはならない。ただし、社会的儀礼又は習俗的行為の範囲を超えないものについては、この限りでない。"},
 {key:"第二十一条",status:"changed",orig:"第二十一条　集会、結社及び言論、出版その他一切の表現の自由は、これを保障する。\n２　検閲は、これをしてはならない。通信の秘密は、これを侵してはならない。",draft:"（表現の自由）\n第二十一条　集会、結社及び言論、出版その他一切の表現の自由は、保障する。\n２　前項の規定にかかわらず、公益及び公の秩序を害することを目的とした活動を行い、並びにそれを目的として結社をすることは、認められない。\n３　検閲は、してはならない。通信の秘密は、侵してはならない。"},
 {key:"第二十一条の二（新設）",status:"added",orig:"",draft:"（国政上の行為に関する説明の責務）\n第二十一条の二　国は、国政上の行為につき国民に説明する責務を負う。"},
 {key:"第二十二条",status:"changed",orig:"第二十二条　何人も、公共の福祉に反しない限り、居住、移転及び職業選択の自由を有する。\n２　何人も、外国に移住し、又は国籍を離脱する自由を侵されない。",draft:"（居住、移転及び職業選択等の自由等）\n第二十二条　何人も、居住、移転及び職業選択の自由を有する。\n２　全て国民は、外国に移住し、又は国籍を離脱する自由を有する。"},
 {key:"第二十四条",status:"changed",orig:"第二十四条　婚姻は、両性の合意のみに基いて成立し、夫婦が同等の権利を有することを基本として、相互の協力により、維持されなければならない。\n２　配偶者の選択、財産権、相続、住居の選定、離婚並びに婚姻及び家族に関するその他の事項に関しては、法律は、個人の尊厳と両性の本質的平等に立脚して、制定されなければならない。",draft:"（家族、婚姻等に関する基本原則）\n第二十四条　家族は、社会の自然かつ基礎的な単位として、尊重される。家族は、互いに助け合わなければならない。\n２　婚姻は、両性の合意に基づいて成立し、夫婦が同等の権利を有することを基本として、相互の協力により、維持されなければならない。\n３　家族、扶養、後見、婚姻及び離婚、財産権、相続並びに親族に関するその他の事項に関しては、法律は、個人の尊厳と両性の本質的平等に立脚して、制定されなければならない。"},
 {key:"第二十五条",status:"changed",orig:"第二十五条　すべて国民は、健康で文化的な最低限度の生活を営む権利を有する。\n２　国は、すべての生活部面について、社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならない。",draft:"（生存権等）\n第二十五条　全て国民は、健康で文化的な最低限度の生活を営む権利を有する。\n２　国は、国民生活のあらゆる側面において、社会福祉、社会保障及び公衆衛生の向上及び増進に努めなければならない。"},
 {key:"第二十五条の二（新設）",status:"added",orig:"",draft:"（環境保全の責務）\n第二十五条の二　国は、国民と協力して、国民が良好な環境を享受することができるようにその保全に努めなければならない。"},
 {key:"第二十五条の三（新設）",status:"added",orig:"",draft:"（在外国民の保護）\n第二十五条の三　国は、国外において緊急事態が生じたときは、在外国民の保護に努めなければならない。"},
 {key:"第二十五条の四（新設）",status:"added",orig:"",draft:"（犯罪被害者等への配慮）\n第二十五条の四　国は、犯罪被害者及びその家族の人権及び処遇に配慮しなければならない。"},
 {key:"第二十六条",status:"changed",orig:"第二十六条　すべて国民は、法律の定めるところにより、その能力に応じて、ひとしく教育を受ける権利を有する。\n２　すべて国民は、法律の定めるところにより、その保護する子女に普通教育を受けさせる義務を負ふ。義務教育は、これを無償とする。",draft:"（教育に関する権利及び義務等）\n第二十六条　全て国民は、法律の定めるところにより、その能力に応じて、等しく教育を受ける権利を有する。\n２　全て国民は、法律の定めるところにより、その保護する子に普通教育を受けさせる義務を負う。義務教育は、無償とする。\n３　国は、教育が国の未来を切り拓く上で欠くことのできないものであることに鑑み、教育環境の整備に努めなければならない。"},
 {key:"第二十八条",status:"changed",orig:"第二十八条　勤労者の団結する権利及び団体交渉その他の団体行動をする権利は、これを保障する。",draft:"（勤労者の団結権等）\n第二十八条　勤労者の団結する権利及び団体交渉その他の団体行動をする権利は、保障する。\n２　公務員については、全体の奉仕者であることに鑑み、法律の定めるところにより、前項に規定する権利の全部又は一部を制限することができる。この場合においては、公務員の勤労条件を改善するため、必要な措置が講じられなければならない。"},
 {key:"第二十九条",status:"changed",orig:"第二十九条　財産権は、これを侵してはならない。\n２　財産権の内容は、公共の福祉に適合するやうに、法律でこれを定める。\n３　私有財産は、正当な補償の下に、これを公共のために用ひることができる。",draft:"（財産権）\n第二十九条　財産権は、保障する。\n２　財産権の内容は、公益及び公の秩序に適合するように、法律で定める。この場合において、知的財産権については、国民の知的創造力の向上に資するように配慮しなければならない。\n３　私有財産は、正当な補償の下に、公共のために用いることができる。"},
 {key:"第三十一条",status:"changed",orig:"第三十一条　何人も、法律の定める手続によらなければ、その生命若しくは自由を奪はれ、又はその他の刑罰を科せられない。",draft:"（適正手続の保障）\n第三十一条　何人も、法律の定める適正な手続によらなければ、その生命若しくは自由を奪われ、又はその他の刑罰を科せられない。"},
 {key:"第三十六条",status:"changed",orig:"第三十六条　公務員による拷問及び残虐な刑罰は、絶対にこれを禁ずる。",draft:"（拷問及び残虐な刑罰の禁止）\n第三十六条　公務員による拷問及び残虐な刑罰は、禁止する。"},
 {key:"第三十八条",status:"changed",orig:"第三十八条　何人も、自己に不利益な供述を強要されない。\n２　強制、拷問若しくは脅迫による自白又は不当に長く抑留若しくは拘禁された後の自白は、これを証拠とすることができない。\n３　何人も、自己に不利益な唯一の証拠が本人の自白である場合には、有罪とされ、又は刑罰を科せられない。",draft:"（刑事事件における自白等）\n第三十八条　何人も、自己に不利益な供述を強要されない。\n２　拷問、脅迫その他の強制による自白又は不当に長く抑留され、若しくは拘禁された後の自白は、証拠とすることができない。\n３　何人も、自己に不利益な唯一の証拠が本人の自白である場合には、有罪とされない。"},
 {key:"第三十九条",status:"changed",orig:"第三十九条　何人も、実行の時に適法であつた行為又は既に無罪とされた行為については、刑事上の責任を問はれない。又、同一の犯罪について、重ねて刑事上の責任を問はれない。",draft:"（遡及処罰等の禁止）\n第三十九条　何人も、実行の時に違法ではなかった行為又は既に無罪とされた行為については、刑事上の責任を問われない。同一の犯罪については、重ねて刑事上の責任を問われない。"},
 {key:"第四十条",status:"changed",orig:"第四十条　何人も、抑留又は拘禁された後、無罪の裁判を受けたときは、法律の定めるところにより、国にその補償を求めることができる。",draft:"（刑事補償を求める権利）\n第四十条　何人も、抑留され、又は拘禁された後、裁判の結果無罪となったときは、法律の定めるところにより、国にその補償を求めることができる。"}
]},
{title:"第四章　国会",articles:[
 {key:"第五十二条",status:"changed",orig:"第五十二条　国会の常会は、毎年一回これを召集する。",draft:"（通常国会）\n第五十二条　通常国会は、毎年一回召集される。\n２　通常国会の会期は、法律で定める。"},
 {key:"第五十三条",status:"changed",orig:"第五十三条　内閣は、国会の臨時会の召集を決定することができる。いづれかの議院の総議員の四分の一以上の要求があれば、内閣は、その召集を決定しなければならない。",draft:"（臨時国会）\n第五十三条　内閣は、臨時国会の召集を決定することができる。いずれかの議院の総議員の四分の一以上の要求があったときは、要求があった日から二十日以内に臨時国会が召集されなければならない。"},
 {key:"第五十四条",status:"changed",orig:"第五十四条　衆議院が解散されたときは、解散の日から四十日以内に、衆議院議員の総選挙を行ひ、その選挙の日から三十日以内に、国会を召集しなければならない。\n２　衆議院が解散されたときは、参議院は、同時に閉会となる。但し、内閣は、国に緊急の必要があるときは、参議院の緊急集会を求めることができる。\n３　前項但書の緊急集会において採られた措置は、臨時のものであつて、次の国会開会の後十日以内に、衆議院の同意がない場合には、その効力を失ふ。",draft:"（衆議院の解散等）\n第五十四条　衆議院の解散は、内閣総理大臣が決定する。\n２　衆議院が解散されたときは、解散の日から四十日以内に、衆議院議員の総選挙を行い、その選挙の日から三十日以内に、特別国会が召集されなければならない。\n３　衆議院が解散されたときは、参議院は、同時に閉会となる。ただし、内閣は、国に緊急の必要があるときは、参議院の緊急集会を求めることができる。\n４　前項ただし書の緊急集会において採られた措置は、臨時のものであって、次の国会開会の後十日以内に、衆議院の同意がない場合には、その効力を失う。"},
 {key:"第六十三条",status:"changed",orig:"第六十三条　内閣総理大臣その他の国務大臣は、両議院の一に議席を有すると有しないとにかかはらず、何時でも議案について発言するため議院に出席することができる。又、答弁又は説明のため出席を求められたときは、出席しなければならない。",draft:"（議院出席の権利及び義務）\n第六十三条　内閣総理大臣及びその他の国務大臣は、議案について発言するため両議院に出席することができる。\n２　内閣総理大臣及びその他の国務大臣は、答弁又は説明のため議院から出席を求められたときは、出席しなければならない。ただし、職務の遂行上特に必要がある場合は、この限りでない。"},
 {key:"第六十四条の二（新設）",status:"added",orig:"",draft:"（政党）\n第六十四条の二　国は、政党が議会制民主主義に不可欠の存在であることに鑑み、その活動の公正の確保及びその健全な発展に努めなければならない。\n２　政党の政治活動の自由は、保障する。\n３　前二項に定めるもののほか、政党に関する事項は、法律で定める。"}
]},
{title:"第五章　内閣",articles:[
 {key:"第六十五条",status:"changed",orig:"第六十五条　行政権は、内閣に属する。",draft:"（内閣と行政権）\n第六十五条　行政権は、この憲法に特別の定めのある場合を除き、内閣に属する。"},
 {key:"第六十六条",status:"changed",orig:"第六十六条　内閣は、法律の定めるところにより、その首長たる内閣総理大臣及びその他の国務大臣でこれを組織する。\n２　内閣総理大臣その他の国務大臣は、文民でなければならない。\n３　内閣は、行政権の行使について、国会に対し連帯して責任を負ふ。",draft:"（内閣の構成及び国会に対する責任）\n第六十六条　内閣は、法律の定めるところにより、その首長である内閣総理大臣及びその他の国務大臣で構成する。\n２　内閣総理大臣及び全ての国務大臣は、現役の軍人であってはならない。\n３　内閣は、行政権の行使について、国会に対し連帯して責任を負う。"},
 {key:"第七十二条",status:"changed",orig:"第七十二条　内閣総理大臣は、内閣を代表して議案を国会に提出し、一般国務及び外交関係について国会に報告し、並びに行政各部を指揮監督する。",draft:"（内閣総理大臣の職務）\n第七十二条　内閣総理大臣は、行政各部を指揮監督し、その総合調整を行う。\n２　内閣総理大臣は、内閣を代表して、議案を国会に提出し、並びに一般国務及び外交関係について国会に報告する。\n３　内閣総理大臣は、最高指揮官として、国防軍を統括する。"},
 {key:"第七十三条",status:"changed",orig:"第七十三条　内閣は、他の一般行政事務の外、左の事務を行ふ。\n一　法律を誠実に執行し、国務を総理すること。\n二　外交関係を処理すること。\n三　条約を締結すること。但し、事前に、時宜によつては事後に、国会の承認を経ることを必要とする。\n四　法律の定める基準に従ひ、官吏に関する事務を掌理すること。\n五　予算を作成して国会に提出すること。\n六　この憲法及び法律の規定を実施するために、政令を制定すること。但し、政令には、特にその法律の委任がある場合を除いては、罰則を設けることができない。\n七　大赦、特赦、減刑、刑の執行の免除及び復権を決定すること。",draft:"（内閣の職務）\n第七十三条　内閣は、他の一般行政事務のほか、次に掲げる事務を行う。\n一　法律を誠実に執行し、国務を総理すること。\n二　外交関係を処理すること。\n三　条約を締結すること。ただし、事前に、やむを得ない場合は事後に、国会の承認を経ることを必要とする。\n四　法律の定める基準に従い、国の公務員に関する事務をつかさどること。\n五　予算案及び法律案を作成して国会に提出すること。\n六　法律の規定に基づき、政令を制定すること。ただし、政令には、特にその法律の委任がある場合を除いては、義務を課し、又は権利を制限する規定を設けることができない。\n七　大赦、特赦、減刑、刑の執行の免除及び復権を決定すること。"},
 {key:"第七十五条",status:"changed",orig:"第七十五条　国務大臣は、その在任中、内閣総理大臣の同意がなければ、訴追されない。但し、これがため、訴追の権利は、害されない。",draft:"（国務大臣の不訴追特権）\n第七十五条　国務大臣は、その在任中、内閣総理大臣の同意がなければ、公訴を提起されない。ただし、国務大臣でなくなった後に、公訴を提起することを妨げない。"}
]},
{title:"第六章　司法",articles:[
 {key:"第七十六条",status:"changed",orig:"第七十六条　すべて司法権は、最高裁判所及び法律の定めるところにより設置する下級裁判所に属する。\n２　特別裁判所は、これを設置することができない。行政機関は、終審として裁判を行ふことができない。\n３　すべて裁判官は、その良心に従ひ独立してその職権を行ひ、この憲法及び法律にのみ拘束される。",draft:"（裁判所と司法権）\n第七十六条　全て司法権は、最高裁判所及び法律の定めるところにより設置する下級裁判所に属する。\n２　特別裁判所は、設置することができない。行政機関は、最終的な上訴審として裁判を行うことができない。\n３　全て裁判官は、その良心に従い独立してその職権を行い、この憲法及び法律にのみ拘束される。"},
 {key:"第七十八条",status:"changed",orig:"第七十八条　裁判官は、裁判により、心身の故障のために職務を執ることができないと決定された場合を除いては、公の弾劾によらなければ罷免されない。裁判官の懲戒処分は、行政機関がこれを行ふことはできない。",draft:"（裁判官の身分保障）\n第七十八条　裁判官は、次条第三項に規定する場合及び心身の故障のために職務を執ることができないと裁判により決定された場合を除いては、第六十四条第一項の規定による裁判によらなければ罷免されない。行政機関は、裁判官の懲戒処分を行うことができない。"},
 {key:"第七十九条",status:"changed",orig:"第七十九条　最高裁判所は、その長たる裁判官及び法律の定める員数のその他の裁判官でこれを構成し、その長たる裁判官以外の裁判官は、内閣でこれを任命する。\n２　最高裁判所の裁判官の任命は、その任命後初めて行はれる衆議院議員総選挙の際国民の審査に付し、その後十年を経過した後初めて行はれる衆議院議員総選挙の際更に審査に付し、その後も同様とする。\n３　前項の場合において、投票者の多数が裁判官の罷免を可とするときは、その裁判官は、罷免される。\n４　審査に関する事項は、法律でこれを定める。\n５　最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。\n６　最高裁判所の裁判官は、すべて定期に相当額の報酬を受ける。この報酬は、在任中、これを減額することができない。",draft:"（最高裁判所の裁判官）\n第七十九条　最高裁判所は、その長である裁判官及び法律の定める員数のその他の裁判官で構成し、最高裁判所の長である裁判官以外の裁判官は、内閣が任命する。\n２　最高裁判所の裁判官は、その任命後、法律の定めるところにより、国民の審査を受けなければならない。\n３　前項の審査において罷免すべきとされた裁判官は、罷免される。\n４　最高裁判所の裁判官は、法律の定める年齢に達した時に退官する。\n５　最高裁判所の裁判官は、全て定期に相当額の報酬を受ける。この報酬は、在任中、分限又は懲戒による場合及び一般の公務員の例による場合を除き、減額できない。"}
]},
{title:"第七章　財政",articles:[
 {key:"第八十三条",status:"changed",orig:"第八十三条　国の財政を処理する権限は、国会の議決に基いて、これを行使しなければならない。",draft:"（財政の基本原則）\n第八十三条　国の財政を処理する権限は、国会の議決に基づいて行使しなければならない。\n２　財政の健全性は、法律の定めるところにより、確保されなければならない。"},
 {key:"第八十六条",status:"changed",orig:"第八十六条　内閣は、毎会計年度の予算を作成し、国会に提出して、その審議を受け議決を経なければならない。",draft:"（予算）\n第八十六条　内閣は、毎会計年度の予算案を作成し、国会に提出して、その審議を受け、議決を経なければならない。\n２　内閣は、毎会計年度中において、予算を補正するための予算案を提出することができる。\n３　内閣は、当該会計年度開始前に第一項の議決を得られる見込みがないと認めるときは、暫定期間に係る予算案を提出しなければならない。\n４　毎会計年度の予算は、法律の定めるところにより、国会の議決を経て、翌年度以降の年度においても支出することができる。"}
]},
{title:"第八章　地方自治",articles:[
 {key:"第九十二条",status:"changed",orig:"第九十二条　地方公共団体の組織及び運営に関する事項は、地方自治の本旨に基いて、法律でこれを定める。",draft:"（地方自治の本旨）\n第九十二条　地方自治は、住民の参画を基本とし、住民に身近な行政を自主的、自立的かつ総合的に実施することを旨として行う。\n２　住民は、その属する地方自治体の役務の提供を等しく受ける権利を有し、その負担を公平に分担する義務を負う。"},
 {key:"第九十四条",status:"changed",orig:"第九十四条　地方公共団体は、その財産を管理し、事務を処理し、及び行政を執行する権能を有し、法律の範囲内で条例を制定することができる。",draft:"（地方自治体の議会及び公務員の直接選挙）\n第九十四条　地方自治体には、法律の定めるところにより、条例その他重要事項を議決する機関として、議会を設置する。\n２　地方自治体の長、議会の議員及び法律の定めるその他の公務員は、当該地方自治体の住民であって日本国籍を有する者が直接選挙する。"}
]},
{title:"第九章　緊急事態（草案新設）・改正条件変更",articles:[
 {key:"第九十六条→第百条（改正要件緩和）",status:"changed",
  orig:"第九十六条　この憲法の改正は、各議院の総議員の三分の二以上の賛成で、国会が、これを発議し、国民に提案してその承認を経なければならない。この承認には、特別の国民投票又は国会の定める選挙の際行はれる投票において、その過半数の賛成を必要とする。\n２　憲法改正について前項の承認を経たときは、天皇は、国民の名で、この憲法と一体を成すものとして、直ちにこれを公布する。",
  draft:"（草案：第百条）\n第百条　この憲法の改正は、衆議院又は参議院の議員の発議により、両議院のそれぞれの総議員の過半数の賛成で国会が議決し、国民に提案してその承認を得なければならない。この承認には、法律の定めるところにより行われる国民の投票において有効投票の過半数の賛成を必要とする。\n２　憲法改正について前項の承認を経たときは、天皇は、直ちに憲法改正を公布する。"},
 {key:"第九十八条（新設・緊急事態宣言）",status:"added",orig:"",
  draft:"（緊急事態の宣言）\n第九十八条　内閣総理大臣は、我が国に対する外部からの武力攻撃、内乱等による社会秩序の混乱、地震等による大規模な自然災害その他の法律で定める緊急事態において、特に必要があると認めるときは、法律の定めるところにより、閣議にかけて、緊急事態の宣言を発することができる。\n２　緊急事態の宣言は、法律の定めるところにより、事前又は事後に国会の承認を得なければならない。\n３　内閣総理大臣は、前項の場合において不承認の議決があったとき、又は事態の推移により当該宣言を継続する必要がないと認めるときは、法律の定めるところにより、閣議にかけて、当該宣言を速やかに解除しなければならない。また、百日を超えて継続しようとするときは、百日を超えるごとに、事前に国会の承認を得なければならない。\n４　第二項の国会の承認については、第六十条第二項の規定を準用する。この場合において、「三十日以内」とあるのは、「五日以内」と読み替えるものとする。"},
 {key:"第九十九条（新設・緊急事態効果）",status:"added",orig:"",
  draft:"（緊急事態の宣言の効果）\n第九十九条　緊急事態の宣言が発せられたときは、法律の定めるところにより、内閣は法律と同一の効力を有する政令を制定することができるほか、内閣総理大臣は財政上必要な支出その他の処分を行い、地方自治体の長に対して必要な指示をすることができる。\n２　前項の政令の制定及び処分については、法律の定めるところにより、事後に国会の承認を得なければならない。\n３　緊急事態の宣言が発せられた場合には、何人も、法律の定めるところにより、当該宣言に係る事態において国民の生命、身体及び財産を守るために行われる措置に関して発せられる国その他公の機関の指示に従わなければならない。この場合においても、第十四条、第十八条、第十九条、第二十一条その他の基本的人権に関する規定は、最大限に尊重されなければならない。\n４　緊急事態の宣言が発せられた場合においては、法律の定めるところにより、その宣言が効力を有する期間、衆議院は解散されないものとし、両議院の議員の任期及びその選挙期日の特例を設けることができる。"}
]},

/* ═══════ STATE ═══════ */
let view='split',filter='all',theme='light';

/* ═══════ RENDER ═══════ */
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const sLabel=s=>({changed:'変更',added:'新設',deleted:'削除'}[s]||'同一');

function splitView(art){
  if(art.status==='added')return`<div class="opane"><div class="olbl">▶ 草案 新設条文</div>${esc(art.draft).split('\n').map(l=>`<div>${l||'&nbsp;'}</div>`).join('')}</div>`;
  if(art.status==='deleted')return`<div class="opane"><div class="olbl">✕ 現行（草案では削除）</div>${esc(art.orig).split('\n').map(l=>`<div>${l||'&nbsp;'}</div>`).join('')}</div>`;
  const oh=art.orig.split('\n').map(l=>`<div>${esc(l)||'&nbsp;'}</div>`).join('');
  const nh=art.draft.split('\n').map(l=>`<div>${esc(l)||'&nbsp;'}</div>`).join('');
  return`<div class="split"><div class="pane orig"><div class="plbl"><span class="pdot"></span>現行憲法</div>${oh}</div><div class="pane drft"><div class="plbl"><span class="pdot"></span>改正草案</div>${nh}</div></div>`;
}

function diffView(art){
  if(art.status==='added')return`<div class="diffwrap">${art.draft.split('\n').map(l=>`<div class="dl add"><span class="dm">+</span><span class="dt">${esc(l)||'&nbsp;'}</span></div>`).join('')}</div>`;
  if(art.status==='deleted')return`<div class="diffwrap">${art.orig.split('\n').map(l=>`<div class="dl del"><span class="dm">−</span><span class="dt">${esc(l)||'&nbsp;'}</span></div>`).join('')}</div>`;
  const oL=art.orig.split('\n'),nL=art.draft.split('\n');
  const oS=new Set(oL),nS=new Set(nL);
  let h='<div class="diffwrap">';
  for(const l of oL){
    if(nS.has(l))h+=`<div class="dl ctx"><span class="dm"> </span><span class="dt">${esc(l)||'&nbsp;'}</span></div>`;
    else h+=`<div class="dl del"><span class="dm">−</span><span class="dt">${esc(l)||'&nbsp;'}</span></div>`;
  }
  for(const l of nL){
    if(!oS.has(l))h+=`<div class="dl add"><span class="dm">+</span><span class="dt">${esc(l)||'&nbsp;'}</span></div>`;
  }
  return h+'</div>';
}

function renderAll(){
  const el=document.getElementById('main');
  let h='';
  CHAPTERS.forEach((ch,ci)=>{
    const arts=ch.articles.filter(a=>filter==='all'||a.status===filter);
    if(!arts.length)return;
    h+=`<div class="chb" id="ch${ci}"><div class="chh" onclick="toggleCh(${ci})"><span class="chbar"></span>${esc(ch.title)}<span class="chtog" id="chtog${ci}">▾ 折りたたむ</span></div><div class="cha" id="cha${ci}">`;
    arts.forEach((art,ai)=>{
      const id=`a${ci}_${ai}`;
      const body=view==='split'?splitView(art):diffView(art);
      h+=`<div class="card status-${art.status}" id="${id}"><div class="cardh" onclick="tc('${id}')"><span class="cardkey">${esc(art.key)}</span><span class="cardbadge">${sLabel(art.status)}</span><span class="cardarr">▾</span></div><div class="cardbody">${body}</div></div>`;
    });
    h+='</div></div>';
  });
  el.innerHTML=h||'<div style="padding:40px 0;text-align:center;color:var(--tx3)">該当する条文がありません</div>';
  setTimeout(()=>document.querySelectorAll('.card').forEach(el=>obs.observe(el)),80);
}

function renderSb(){
  let h='';
  CHAPTERS.forEach((ch,ci)=>{
    const s=ch.title.length>15?ch.title.slice(0,15)+'…':ch.title;
    h+=`<div class="ncht" id="ncht${ci}" onclick="toggleNch(${ci})">${esc(s)}<span class="arr">▾</span></div><div class="nvl" id="nvl${ci}">`;
    ch.articles.forEach((art,ai)=>h+=`<div class="nvi" id="nv${ci}_${ai}" onclick="go(${ci},${ai})"><span class="dot ${art.status}"></span>${esc(art.key)}</div>`);
    h+='</div>';
  });
  document.getElementById('sbn').innerHTML=h;
}

/* ═══════ CONTROLS ═══════ */
function setView(v){view=v;document.querySelectorAll('#vtog .pb').forEach(b=>b.classList.toggle('on',b.dataset.v===v));renderAll();}
function setFilter(f){filter=f;document.querySelectorAll('.fbb').forEach(b=>b.classList.toggle('on',b.dataset.f===f));renderAll();}
function toggleTheme(){theme=theme==='dark'?'light':'dark';document.documentElement.dataset.theme=theme;document.getElementById('thbtn').textContent=theme==='dark'?'🌙':'☀️';}
function toggleCh(ci){const e=document.getElementById(`cha${ci}`),t=document.getElementById(`chtog${ci}`);const c=e.classList.toggle('cls');t.textContent=c?'▸ 展開する':'▾ 折りたたむ';}
function toggleNch(ci){document.getElementById(`nvl${ci}`).classList.toggle('cls');document.getElementById(`ncht${ci}`).classList.toggle('cls');}
function tc(id){document.getElementById(id).classList.toggle('cls');}
function go(ci,ai){const e=document.getElementById(`a${ci}_${ai}`);if(!e)return;e.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nvi').forEach(n=>n.classList.remove('active'));document.getElementById(`nv${ci}_${ai}`)?.classList.add('active');}

document.getElementById('vtog').addEventListener('click',e=>{const b=e.target.closest('.pb');if(b)setView(b.dataset.v);});
document.getElementById('fb').addEventListener('click',e=>{const b=e.target.closest('.fbb');if(b)setFilter(b.dataset.f);});
document.getElementById('thbtn').addEventListener('click',toggleTheme);
document.getElementById('q').addEventListener('input',function(){const q=this.value.toLowerCase();document.querySelectorAll('.nvi').forEach(e=>e.style.display=e.textContent.toLowerCase().includes(q)?'':'none');});
window.addEventListener('scroll',()=>document.getElementById('stop').classList.toggle('on',scrollY>500),{passive:true});

const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(!e.isIntersecting)return;
    const raw=e.target.id.replace('a','');
    const[c,a]=raw.split('_');
    if(!c||!a)return;
    document.querySelectorAll('.nvi').forEach(n=>n.classList.remove('active'));
    document.getElementById(`nv${c}_${a}`)?.classList.add('active');
  });
},{threshold:.15,rootMargin:'-64px 0px -40% 0px'});

renderSb();
renderAll();
</script>
</body>
</html>
